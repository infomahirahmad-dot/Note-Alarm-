name: Build NoteAlarm.exe

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pywebview pyinstaller pythonnet

      - name: Build .exe
        run: |
          pyinstaller NoteAlarm.spec --clean --noconfirm

      - name: Upload NoteAlarm.exe
        uses: actions/upload-artifact@v4
        with:
          name: NoteAlarm-Windows
          path: dist/NoteAlarm.exe
          retention-days: 30
